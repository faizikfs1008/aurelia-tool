<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aurelia — Content Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
body {
  background:#1a1612;
  color:#F9F5EE;
  font-family:Montserrat;
  text-align:center;
  padding:40px;
}
input,select,textarea {
  margin:10px;
  padding:10px;
  width:250px;
}
button {
  padding:12px 30px;
  background:#C9A96E;
  border:none;
  cursor:pointer;
}
#errorEl { color:red; margin-top:20px; }
#output { margin-top:30px; display:none; }
</style>
</head>

<body>

<h1>Aurelia Content Studio</h1>

<select id="productType">
  <option value="">Select type</option>
  <option>Necklace</option>
  <option>Ring</option>
</select>

<input id="designStyle" placeholder="Design style"/>
<input id="stoneType" placeholder="Stone"/>
<input id="price" placeholder="Price"/>
<input id="audience" placeholder="Audience"/>
<input id="location" placeholder="Location"/>

<textarea id="customDesc" placeholder="Describe product"></textarea>

<br><br>

<button id="generateBtn">Generate Content</button>

<div id="errorEl"></div>

<div id="output">
  <h3>Hook</h3>
  <p id="hookText"></p>

  <h3>Caption</h3>
  <p id="captionText"></p>

  <h3>Hashtags</h3>
  <p id="hashtagsText"></p>
</div>

<script>

document.getElementById('generateBtn').addEventListener('click', async () => {

  const productType = document.getElementById('productType').value;
  const designStyle = document.getElementById('designStyle').value;
  const stoneType = document.getElementById('stoneType').value;
  const price = document.getElementById('price').value;
  const audience = document.getElementById('audience').value;
  const location = document.getElementById('location').value;
  const customDesc = document.getElementById('customDesc').value;

  const errorEl = document.getElementById('errorEl');
  const output = document.getElementById('output');

  errorEl.innerText = "";
  output.style.display = "none";

  if (!productType) {
    alert("Select product type");
    return;
  }

  try {
    console.log("Sending request...");

    const res = await fetch('/api/generate', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        model: "claude-3-haiku-20240307",
        max_tokens: 500,
        messages:[{
          role:"user",
          content:`Generate luxury jewelry caption JSON:
Product: ${productType}
Style: ${designStyle}
Stone: ${stoneType}
Price: ${price}
Audience: ${audience}
Location: ${location}
Description: ${customDesc}

Return JSON:
{
"hook":"",
"caption":"",
"hashtags":[]
}`
        }]
      })
    });

    const data = await res.json();
    console.log("API RESPONSE:", data);

    if (!res.ok) {
      throw new Error(JSON.stringify(data));
    }

    const raw = data?.content?.[0]?.text;

    if (!raw) {
      throw new Error("No content returned");
    }

    const clean = raw.replace(/```json|```/g,'').trim();

    let parsed;
    try {
      parsed = JSON.parse(clean);
    } catch(e) {
      console.error(clean);
      throw new Error("Invalid JSON from AI");
    }

    document.getElementById('hookText').innerText = parsed.hook;
    document.getElementById('captionText').innerText = parsed.caption;
    document.getElementById('hashtagsText').innerText = parsed.hashtags.join(" ");

    output.style.display = "block";

  } catch(e) {
    console.error(e);
    errorEl.innerText = e.message;
  }

});

</script>

</body>
</html>
